<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1A1512" />
  <meta name="description" content="Lumière — Scandinavian furniture for real living. Shop curated collections with free white-glove delivery." />
  <meta property="og:title" content="Lumière Home Furniture" />
  <meta property="og:description" content="Beautifully crafted furniture for every room." />
  <meta property="og:type" content="website" />

  <title>Lumière — Furniture for Real Living</title>

  <!-- Favicon inline SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23C4955A'/><rect x='5' y='5' width='10' height='10' rx='2' fill='%231A1512' opacity='.9'/><rect x='17' y='5' width='10' height='10' rx='2' fill='%231A1512' opacity='.55'/><rect x='5' y='17' width='10' height='10' rx='2' fill='%231A1512' opacity='.55'/><rect x='17' y='17' width='10' height='10' rx='2' fill='%231A1512' opacity='.9'/></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── RESET & BASE ──────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --dark:  #1A1512;
      --dark2: #231E18;
      --dark3: #2E2720;
      --gold:  #C4955A;
      --gold2: #E8C88A;
      --cream: #F7F2EA;
      --muted: #9A8E80;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--dark);
      color: var(--cream);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ════════════════════════════════════════════════════════
       SPLASH SCREEN
    ════════════════════════════════════════════════════════ */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: default;
    }

    /* Grain texture */
    #splash::after {
      content: '';
      position: absolute;
      inset: -100%;
      width: 300%; height: 300%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      opacity: 0.5;
      pointer-events: none;
      animation: grainShift 0.6s steps(2) infinite;
    }
    @keyframes grainShift {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-1%,-2%); }
      50%  { transform: translate(2%,1%); }
      75%  { transform: translate(-1%,2%); }
      100% { transform: translate(1%,-1%); }
    }

    /* Particle canvas */
    #s-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* Rings */
    .s-ring {
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      border: 1px solid rgba(196,149,90,0.1);
      transform: translate(-50%,-50%) scale(0.6);
      opacity: 0;
      animation: ringExpand 3.5s ease-out infinite;
    }
    .s-ring:nth-child(1) { width: 280px; height: 280px; animation-delay: 0.4s; }
    .s-ring:nth-child(2) { width: 480px; height: 480px; animation-delay: 1.2s; }
    .s-ring:nth-child(3) { width: 680px; height: 680px; animation-delay: 2.0s; }
    @keyframes ringExpand {
      0%   { transform: translate(-50%,-50%) scale(0.6); opacity: 0; }
      15%  { opacity: 0.8; }
      100% { transform: translate(-50%,-50%) scale(1.4); opacity: 0; }
    }

    /* Glow blob */
    .s-glow {
      position: absolute;
      top: 50%; left: 50%;
      width: 560px; height: 560px;
      transform: translate(-50%,-50%);
      background: radial-gradient(circle, rgba(196,149,90,0.13) 0%, transparent 68%);
      border-radius: 50%;
      filter: blur(40px);
      animation: glowPulse 4s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100% { transform: translate(-50%,-50%) scale(1);    opacity: 0.8; }
      50%      { transform: translate(-50%,-50%) scale(1.18); opacity: 1;   }
    }

    /* Grid lines */
    .s-grid-h, .s-grid-v {
      position: absolute;
      background: rgba(196,149,90,0.055);
      pointer-events: none;
    }
    .s-grid-h { left:0; right:0; height:1px; }
    .s-grid-v { top:0; bottom:0; width:1px; }

    /* Corner ornaments */
    .s-corner {
      position: absolute;
      width: 52px; height: 52px;
      opacity: 0;
      animation: fadeIn 1.2s 0.6s forwards;
    }
    .s-corner::before, .s-corner::after {
      content: '';
      position: absolute;
      background: var(--gold);
      opacity: 0.45;
    }
    .s-corner::before { top:0; left:0; width:100%; height:1px; }
    .s-corner::after  { top:0; left:0; width:1px; height:100%; }
    .s-corner.tl { top:28px; left:28px; }
    .s-corner.tr { top:28px; right:28px; transform:rotate(90deg); }
    .s-corner.bl { bottom:28px; left:28px; transform:rotate(270deg); }
    .s-corner.br { bottom:28px; right:28px; transform:rotate(180deg); }

    /* Scan line */
    .s-scan {
      position: absolute;
      left:0; right:0; top:-2px; height:2px;
      background: linear-gradient(90deg, transparent, rgba(196,149,90,0.12), rgba(196,149,90,0.38), rgba(196,149,90,0.12), transparent);
      animation: scanSweep 3.2s ease-in-out 1s infinite;
    }
    @keyframes scanSweep {
      0%   { top:-2px; opacity:0; }
      8%   { opacity:1; }
      92%  { opacity:1; }
      100% { top:100%; opacity:0; }
    }

    /* Outer frame */
    .s-frame {
      position: absolute;
      inset: 20px;
      border: 1px solid rgba(196,149,90,0.1);
      pointer-events: none;
      opacity: 0;
      animation: fadeIn 1.5s 0.4s forwards;
    }

    /* ── LOGO ────────────────────────────────────────────── */
    .s-logo {
      position: relative; z-index:2;
      display: flex; flex-direction: column;
      align-items: center;
      opacity: 0;
      transform: translateY(28px) scale(0.85);
      animation: logoReveal 1s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
    }
    @keyframes logoReveal {
      to { opacity:1; transform:translateY(0) scale(1); }
    }

    .s-mark {
      width: 88px; height: 88px;
      background: var(--gold);
      border-radius: 12px;
      position: relative;
      box-shadow: 0 0 60px rgba(196,149,90,0.25), 0 20px 40px rgba(0,0,0,0.4);
    }
    .s-mark-cell {
      position: absolute;
      width: 27px; height: 27px;
      background: var(--dark);
      border-radius: 4px;
    }
    .s-mark-cell:nth-child(1) { top:12px; left:12px; opacity:0.92; }
    .s-mark-cell:nth-child(2) { top:12px; right:12px; opacity:0.58; }
    .s-mark-cell:nth-child(3) { bottom:12px; left:12px; opacity:0.58; }
    .s-mark-cell:nth-child(4) { bottom:12px; right:12px; opacity:0.92; }

    /* Brand name */
    .s-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 7vw, 88px);
      font-weight: 300;
      color: var(--cream);
      letter-spacing: 0.22em;
      line-height: 1;
      margin-top: 26px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.85s forwards;
    }
    .s-name em { color: var(--gold); font-style: italic; font-weight: 300; }

    /* Divider */
    .s-divider {
      width: 260px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 24px 0 20px;
      transform: scaleX(0);
      transform-origin: center;
      animation: scaleIn 1s cubic-bezier(0.16,1,0.3,1) 1.3s forwards;
    }
    @keyframes scaleIn { to { transform: scaleX(1); } }

    /* Tagline */
    .s-tag {
      font-size: 11px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.9s ease 1.6s forwards;
    }

    /* Dots bar */
    .s-dots {
      display: flex; gap: 7px;
      margin-top: 28px;
      opacity: 0;
      animation: fadeIn 0.6s 1.8s forwards;
    }
    .s-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold);
      animation: dotBeat 1.6s ease-in-out infinite;
    }
    .s-dot:nth-child(1){animation-delay:0s;   opacity:0.28;}
    .s-dot:nth-child(2){animation-delay:0.18s; opacity:0.55;}
    .s-dot:nth-child(3){animation-delay:0.36s; opacity:1;   }
    .s-dot:nth-child(4){animation-delay:0.54s; opacity:0.55;}
    .s-dot:nth-child(5){animation-delay:0.72s; opacity:0.28;}
    @keyframes dotBeat { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(2.2)} }

    /* Loading bar */
    .s-loader {
      position: absolute;
      bottom: 56px;
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      opacity: 0;
      animation: fadeIn 0.6s 2s forwards;
    }
    .s-track {
      width: 200px; height: 1px;
      background: rgba(196,149,90,0.13);
      overflow: hidden;
    }
    .s-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      width: 0;
      animation: fillBar 2.4s cubic-bezier(0.4,0,0.2,1) 2.1s forwards;
    }
    @keyframes fillBar { to { width: 100%; } }
    .s-loader-text {
      font-size: 9px;
      letter-spacing: 0.36em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Exit */
    #splash.exit {
      animation: splashOut 0.9s cubic-bezier(0.76,0,0.24,1) forwards;
      pointer-events: none;
    }
    @keyframes splashOut {
      0%   { opacity:1; transform:scale(1); }
      55%  { opacity:1; transform:scale(1.025); }
      100% { opacity:0; transform:scale(1.055); }
    }

    /* ── UTILS ────────────────────────────────────────────── */
    @keyframes fadeIn  { to { opacity:1; } }
    @keyframes fadeUp  { to { opacity:1; transform:translateY(0); } }

    /* ── REACT ROOT ───────────────────────────────────────── */
    #root {
      min-height: 100vh;
      opacity: 0;
      transition: opacity 0.9s ease;
    }
    #root.visible { opacity: 1; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════ -->
<!--  SPLASH SCREEN                                      -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="splash" onclick="dismissSplash()">

  <!-- Animated rings -->
  <div class="s-ring"></div>
  <div class="s-ring"></div>
  <div class="s-ring"></div>

  <!-- Glow blob -->
  <div class="s-glow"></div>

  <!-- Outer frame -->
  <div class="s-frame"></div>

  <!-- Scan line -->
  <div class="s-scan"></div>

  <!-- Corner ornaments -->
  <div class="s-corner tl"></div>
  <div class="s-corner tr"></div>
  <div class="s-corner bl"></div>
  <div class="s-corner br"></div>

  <!-- Grid lines -->
  <div class="s-grid-h" style="top:33%"></div>
  <div class="s-grid-h" style="top:66%"></div>
  <div class="s-grid-v" style="left:25%"></div>
  <div class="s-grid-v" style="left:50%"></div>
  <div class="s-grid-v" style="left:75%"></div>

  <!-- Particle canvas -->
  <canvas id="s-canvas"></canvas>

  <!-- LOGO & BRAND -->
  <div class="s-logo">
    <div class="s-mark">
      <div class="s-mark-cell"></div>
      <div class="s-mark-cell"></div>
      <div class="s-mark-cell"></div>
      <div class="s-mark-cell"></div>
    </div>

    <h1 class="s-name">Lumi<em>è</em>re</h1>
    <div class="s-divider"></div>
    <p class="s-tag">Furniture for real living</p>

    <div class="s-dots">
      <div class="s-dot"></div>
      <div class="s-dot"></div>
      <div class="s-dot"></div>
      <div class="s-dot"></div>
      <div class="s-dot"></div>
    </div>
  </div>

  <!-- Loading bar -->
  <div class="s-loader">
    <div class="s-track"><div class="s-fill"></div></div>
    <p class="s-loader-text">Loading your collection</p>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════ -->
<!--  REACT APP ROOT                                     -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="root"></div>

<!-- Vite entry point -->
<script type="module" src="/src/main.jsx"></script>

<script>
  /* ── Particle system ───────────────────────────────── */
  const canvas = document.getElementById('s-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [], raf;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function makeParticle() {
    return {
      x:  Math.random() * W,
      y:  H + 10,
      vx: (Math.random() - 0.5) * 0.35,
      vy: -(Math.random() * 0.55 + 0.12),
      r:  Math.random() * 1.4 + 0.3,
      life: 0,
      maxLife: Math.random() * 0.5 + 0.4,
    };
  }

  for (let i = 0; i < 70; i++) {
    const p = makeParticle();
    p.y    = Math.random() * H;
    p.life = Math.random() * p.maxLife;
    particles.push(p);
  }

  function tick() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x    += p.vx; p.y += p.vy; p.life += 0.004;
      const t = p.life / p.maxLife;
      const a = t < 0.28 ? t/0.28 : t > 0.72 ? (1-t)/0.28 : 1;
      ctx.save();
      ctx.globalAlpha = a * 0.5;
      ctx.fillStyle   = '#C4955A';
      ctx.shadowBlur  = 5;
      ctx.shadowColor = '#C4955A';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
      if (p.life >= p.maxLife || p.y < -10) Object.assign(p, makeParticle());
    });
    raf = requestAnimationFrame(tick);
  }
  tick();

  /* ── Splash dismiss ────────────────────────────────── */
  let done = false;
  function dismissSplash() {
    if (done) return;
    done = true;
    cancelAnimationFrame(raf);
    const splash = document.getElementById('splash');
    const root   = document.getElementById('root');
    splash.classList.add('exit');
    root.classList.add('visible');
    setTimeout(() => splash.remove(), 950);
  }

  /* Auto-dismiss after load bar finishes (~4.6s) */
  setTimeout(dismissSplash, 4600);
</script>

</body>
